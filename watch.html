<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Watch & Review — MCFPN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --hot:    #FF2D55;
  --yellow: #FFD600;
  --cyan:   #00C8E0;
  --lime:   #5EE06A;
  --violet: #9B5FFF;
  --white:  #FFFEF9;
  --cream:  #FFF9E6;
  --dark:   #111111;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--yellow);color:var(--dark);min-height:100vh}

/* APPBAR */
.appbar{
  background:var(--hot);padding:0 28px;min-height:62px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  position:sticky;top:0;z-index:100;border-bottom:5px solid var(--yellow);
}
.appbar-left{display:flex;align-items:center;gap:14px}
.appbar-logo{height:44px;filter:brightness(0) saturate(100%) invert(1);opacity:.95}
.appbar-sep{width:2px;height:32px;background:rgba(255,255,255,.3)}
.appbar-titles h1{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;color:var(--white);line-height:1.1}
.appbar-titles p{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.appbar-link{font-size:11px;font-weight:700;color:var(--yellow);text-decoration:none;border:2px solid rgba(255,214,0,.5);border-radius:100px;padding:5px 14px;transition:all .2s}
.appbar-link:hover{background:var(--yellow);color:var(--hot)}

/* HERO BAND */
.hero-band{
  background:var(--cyan);
  border-bottom:6px solid var(--hot);
  padding:36px 28px 32px;
  position:relative;overflow:hidden;
}
.hero-band::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.3) 1.5px,transparent 1.5px);
  background-size:18px 18px;pointer-events:none
}
.hero-inner{max-width:860px;margin:0 auto;position:relative}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--hot);border-radius:100px;padding:5px 14px 5px 8px;
  font-size:11px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;
  color:var(--white);margin-bottom:16px
}
.hero-dot{width:8px;height:8px;border-radius:50%;background:var(--lime);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hero-headline{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,5vw,60px);color:var(--dark);line-height:1;letter-spacing:.03em;margin-bottom:10px}
.hero-headline em{color:var(--hot);font-style:normal}
.hero-sub{font-size:16px;color:rgba(0,48,64,.8);line-height:1.75;max-width:600px;font-weight:400}
.hero-sub strong{font-weight:700;color:var(--dark)}

/* MAIN CONTENT */
.main{max-width:860px;margin:0 auto;padding:32px 28px 60px}

/* STEP BADGES */
.step{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.step-num{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;
}
.sn1{background:var(--hot);color:var(--yellow)}
.sn2{background:var(--dark);color:var(--lime)}
.step-label{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;color:var(--dark)}

/* VIDEO PANEL */
.video-panel{
  background:var(--dark);border-radius:20px;overflow:hidden;
  border:5px solid var(--dark);box-shadow:7px 7px 0 var(--hot);
  margin-bottom:32px;
}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.video-footer{
  background:var(--dark);padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
}
.video-footer-txt{font-size:13px;color:rgba(255,255,255,.6)}
.video-footer-txt strong{color:var(--lime)}
.video-open-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--hot);color:var(--yellow);border:none;
  border-radius:100px;padding:7px 16px;font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;
  transition:all .18s;letter-spacing:.03em
}
.video-open-btn:hover{background:var(--yellow);color:var(--hot)}

<!-- STEP 2: FORM -->
<div class="step">
  <div class="step-num sn2">2</div>
  <div class="step-label">Enter Your Email to Get the Notes</div>
</div>

<div class="email-panel">
  <div class="email-panel-head">
    <h2>Get the Data Review Notes</h2>
    <p>Takes 30 seconds — we'll send the links straight to your inbox</p>
  </div>
  <div class="email-panel-body">
    <p class="email-instruct">Click below to enter your email and receive links to the <strong>reports and data</strong> you'll need to review before <strong>May 3</strong>.</p>
    <a href="https://www.cognitoforms.com/TierraLocal/FoodPolicyDataReportsReviewNotes" target="_blank" class="email-btn" style="display:inline-block;text-decoration:none;font-size:20px;padding:14px 28px;border-radius:12px;">GET THE REVIEW LINKS →</a>
  </div>
</div>
